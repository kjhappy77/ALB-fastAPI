apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "http-ingress"
  labels:
    app.kubernetes.io/name: "http-ingress"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: fastapi
                port:
                  number: 80
